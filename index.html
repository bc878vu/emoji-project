<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emoji SaaS</title>

<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="nav-right">
    <button id="themeToggle">🌙</button>
  </div>

  <div class="nav-left">
    <span class="logo">✨</span>
    <span class="title">EmojiSaaS</span>
  </div>

  <div class="nav-center">

    <input type="text" id="search" placeholder="Search emojis..." />

    <div class="dropdown">
      <button id="dropBtn">All ⌄</button>
      <div id="dropMenu" class="menu">
        <div data-cat="all">All</div>
        <div data-cat="Smileys & Emotion">Smileys</div>
        <div data-cat="People & Body">People</div>
        <div data-cat="Animals & Nature">Nature</div>
        <div data-cat="Food & Drink">Food</div>
      </div>
    </div>

  </div>

</nav>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-tab="all">All</button>
  <button class="tab" data-tab="favorites">⭐ Favorites</button>
  <button class="tab" data-tab="recent">🕒 Recent</button>
</div>

<!-- MAIN -->
<main id="container"></main>

<!-- TOAST -->
<div id="toast">Copied ✔</div>

<footer>
  <p>© 2026 EmojiSaaS • Built for portfolio 🚀</p>
</footer>

<script src="emojiList.js"></script>
<script src="script.js"></script>

</body>
</html>
