<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmojiSaaS | Premium Emoji Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="home-page">

<nav class="navbar">
  <div class="nav-container">
    <div class="logo-group" onclick="location.href='index.html'">
      <span class="logo">✨</span>
      <span class="title">EmojiSaaS</span>
    </div>

    <div class="nav-center">
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search emojis..." autocomplete="off">

        <div class="dropdown">
          <button id="dropBtn">All ⌄</button>
          <div id="dropMenu" class="menu">
            <div data-cat="all">All Emojis</div>
            <div data-cat="Smileys & Emotion">Smileys</div>
            <div data-cat="People & Body">People</div>
            <div data-cat="Animals & Nature">Nature</div>
            <div data-cat="Food & Drink">Food</div>
            <div data-cat="Activities">Activities</div>
            <div data-cat="Symbols">Symbols</div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav-right">
      <div class="nav-links-desktop">
        <a href="terms.html" class="nav-link">Terms</a>
        <a href="privacy.html" class="nav-link">Privacy</a>
      </div>
      <button id="themeToggle" class="theme-btn">🌙</button>
    </div>
  </div>
</nav>

<div class="content-wrapper">

  <header class="hero-section">
    <h1>Express Yourself with Emojis</h1>
    <p>Premium collection for developers and designers.</p>
  </header>

  <div class="tabs-container">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="favorites">⭐ Favorites</button>
    <button class="tab" data-tab="recent">🕒 Recent</button>
  </div>

  <main id="container" class="emoji-grid"></main>

</div>

<div id="toast">Copied! 🚀</div>

<footer>
  <div class="footer-container">
    <div class="footer-info">
      <span class="footer-logo">✨ EmojiSaaS</span>
      <p>© 2026 Professional Portfolio Project</p>
    </div>
    <div class="footer-nav">
      <a href="index.html">Home</a>
      <a href="terms.html">Terms</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </div>
</footer>

<script src="emojiList.js"></script>
<script src="script.js"></script>
</body>
</html>
