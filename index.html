<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Emoji Pro</title>

  <link rel="icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">

  <!-- LEFT -->
  <div class="nav-left">
    <button id="themeToggle">🌙</button>
  </div>

  <!-- CENTER -->
  <div class="nav-center">
    <span class="logo">✨</span>
    <span class="title">EmojiPro</span>
  </div>

  <!-- RIGHT -->
  <div class="nav-right">

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Search..." />

    <!-- DROPDOWN -->
    <div class="dropdown">
      <button id="dropBtn">All ⌄</button>
      <div id="dropMenu" class="menu">
        <div data-cat="all">All</div>
        <div data-cat="Smileys & Emotion">Smileys</div>
        <div data-cat="People & Body">People</div>
        <div data-cat="Animals & Nature">Nature</div>
        <div data-cat="Food & Drink">Food</div>
      </div>
    </div>

  </div>

</nav>

<!-- MAIN -->
<main id="container"></main>

<!-- TOAST -->
<div id="toast">Copied ✔</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 EmojiPro • Made by Asad 🚀</p>
</footer>

<script src="emojiList.js"></script>
<script src="script.js"></script>

</body>
</html>
